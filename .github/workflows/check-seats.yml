name: Qantas Reward Seat Check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run check
        id: run_check
        continue-on-error: true   # so debug files still get committed even if this fails
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: python check.py

      - name: Commit updated state
        run: |
          git config user.name "seat-checker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json last_raw_response.json debug_screenshot.png || true
          if ! git diff --staged --quiet; then
            git commit -m "Update seat state [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Fail job if check step failed
        if: steps.run_check.outcome == 'failure'
        run: exit 1
